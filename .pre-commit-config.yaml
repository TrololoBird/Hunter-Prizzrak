# Fast local commit gate. Install once: `uv run pre-commit install`.
# Heavy checks (mypy, pytest) stay in CI to keep commits snappy.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: false
      - id: vulture
        name: vulture (dead code, conf 80)
        entry: uv run vulture
        language: system
        pass_filenames: false
        types: [python]
      - id: prohibited-apis
        name: prohibited private CCXT API calls
        entry: uv run python scripts/check_prohibited_apis.py
        language: system
        pass_filenames: false
        files: ^hunt_core/.*\.py$
