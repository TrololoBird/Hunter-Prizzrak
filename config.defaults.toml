# Hunt Watch — пороги (canonical source of truth)

# Единственный источник порогов. config.toml мёржит поверх него только
# [bot]/[bot.network] (см. load_settings() в hunt_core/domain/config.py) —
# любые другие секции в config.toml не читаются.

[hunter]
min_quote_volume_usd = 10_000_000
min_open_interest_usd = 500_000
min_listing_age_days = 7
max_recent_volatility_pct = 80.0
min_change_pct_for_hot = 3.0
max_hot_coins = 10
pump_extreme_pct = 15.0
range_hot_pct = 8.0
pos_near_high = 0.85
pos_near_low = 0.25
score_watch = 45.0
score_priority = 60.0
scan_interval_s = 900
# NOTE: not wired through the defaults parser (domain/config.py forwards only 4
# hunter keys) — the EFFECTIVE value is the fallback in params/store.py
# hunter_thresholds() (currently 50). Kept in sync here for documentation.
watchlist_limit = 50

[watch]
tick_interval_s = 30
# Ignition TG alerts off by default (watchlist-only); set true in env if needed.
ignition_telegram = false
symbol_tick_timeout_s = 180
telegram_cooldown_min = 45
followup_cooldown_min = 5
max_dynamic_symbols = 12
# Lite prescan (D1): debounced promotion into Full-tier slots.
[watch.prescan]
debounce_s = 90
merge_cap = 12
cadence_s = 90
# Skip late-chase prescan outliers already extended on 24h (pre-pump mission).
max_change_pct_for_merge = 8.0
# Advisory digest: optional periodic summary (additive). 0 = no top-N cap.
# HUNT_DIGEST_MAX_ENTRIES=0 HUNT_DIGEST_TOP_N=5 HUNT_ADVISORY_MAX_PER_HOUR=0
# Liquidation burst advisory (P1.9): HUNT_LIQ_BURST_TG=1 to enable cascade radar TG

[confirm]
# Closed-bar TF for structural entry confirm (5m entry precision; 15m secondary).
entry_confirm_tf = "5m"
# Direction-aware confirm TF: dumps complete in minutes, pumps build over hours.
# Dump confirms on the 1m closed bar; long stays on 5m. Fall back to entry_confirm_tf.
entry_confirm_tf_dump = "1m"
entry_confirm_tf_long = "5m"
# On a sub-5m dump confirm TF, one fast closed break + 1 secondary factor confirms
# (avoids waiting 2× 5m bars on liq-thin alts and missing the dump).
dump_fast_confirm = true

[confirm.short]
# REPORTING ONLY — /signals gaps, stats cards (gate/_report.py). Does NOT set setup.confirmed.
# Production confirm authority = fusion gate_open → setup.confirmed (see docs/AUTHORITY_MODEL.md).
min_score = 60
min_score_without_div = 68
forming_min_score = 45

[levels.adaptive]
# Nominal SL cap scales with 24h range (parabolic meme legs).
sl_max_pct_normal = 8.0
sl_max_pct_hot = 11.0
sl_max_pct_parabolic = 14.0
# Range thresholds for mode switch (see hunt_core/levels/levels.py).
hot_range_pct = 60.0
parabolic_range_pct = 120.0
parabolic_leg_gain_pct = 80.0

[pinned.defaults]
# Canonical 7-coin anchor set (operator decision 2026-06-21). Metals (XAU/XAG) and
# PAXG carry thin 1w history → higher-TF panel degrades gracefully (documented, not a bug).
symbols = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "XAUUSDT", "XAGUSDT", "PAXGUSDT"]
modes = { BTCUSDT = "both", ETHUSDT = "both", SOLUSDT = "both", XRPUSDT = "both", XAUUSDT = "both", XAGUSDT = "both", PAXGUSDT = "both" }
deep_continuous = true
hunt_confirm = false
# Deep /signal uses HUNT_FULL_PREPARE=1 + microstructure for these anchors.
analyst = { BTCUSDT = true, ETHUSDT = true, SOLUSDT = true, XRPUSDT = true, XAUUSDT = true, XAGUSDT = true, PAXGUSDT = true }

[analyst.pinned]
interval_s = 300
tg_on_change = true
tg_stale_hours = 4

[analyst]
enabled = true
signal_queue_enabled = true
signal_queue_top_n = 3
signal_queue_tg_footer = true
signal_queue_tg_batch = true
signal_queue_tg_min_rank = 2
signal_queue_ttl_hours = 2.5

[market_regime]
refresh_hours = 4
min_liquid_qvol_usd = 10_000_000

[delivery]
# Catalog EV-primary is default; set HUNT_LEGACY_FUEL=1 to restore legacy fuel scoring only.
ev_primary_default = false
min_ev = 0.0
min_p_win = 0.42
min_p_win_forming = 0.35
min_p_win_exhaustion = 0.52
min_p_win_accumulation = 0.48
min_p_win_anticipation = 0.42

[tracker]
# Auto-close active signals with no successful reconcile longer than this (orphan path).
orphan_ttl_hours = 24
stale_lc_ticks_default = 3
stale_lc_ticks_near_tp1 = 8
near_tp1_remaining_pct = 3.0
reclaim_buffer = 1.001
breakeven_buffer_pct = 0.15
breakeven_buffer_min_pct = 1.0
breakeven_risk_fraction = 0.25
# Defer trailing until MFE proves the move (APT 2026-07-05: 3.49% MFE → stop_hit без трейлинга).
min_trail_mfe_pct = 2.5
dump_active_min_trail_mfe_pct = 2.5
early_breakeven_mfe_pct = 99.0
early_breakeven_buffer_pct = 0.12
dump_active_early_be_mfe_pct = 99.0
dump_initiating_early_be_mfe_pct = 99.0
exhaustion_early_be_mfe_pct = 99.0
accumulation_early_be_mfe_pct = 99.0
distribution_early_be_mfe_pct = 99.0
min_trail_age_minutes = 2.0
tp1_partial_fix_pct_normal = 50.0
tp1_partial_fix_pct_hot = 80.0
# After TP1: breakeven buffer as ATR(1h)% × this fraction (fallback: breakeven_buffer_pct).
tp1_breakeven_atr_fraction = 0.25

# Detection thresholds removed — self-calibration lives in hunt_core/detect/calibrate.py
# and [fusion] below. Feature flags for collect/scoring fuel are in params/store.py.

[scoring]
# Setup catalog CEX burst detectors only (setups/detectors.py).
cex_pump_ret_1m_min = 0.02
cex_dump_ret_1m_max = -0.02
cex_z_vol_30m_min = 3.0
cex_pump_buy_share_min = 0.65
cex_dump_buy_share_max = 0.35

[gate.meme_pump]
volume_ratio_pump_signature_min = 3.0
volume_ratio_pump_extreme_min = 5.0

[gate.strategic]
# move/tradability gates: shadow (log only) until Phase 8 OOS. Set hard=true or HUNT_STRATEGIC_GATES_HARD=1 to block.
hard = false

[maps]
enabled = true
multi_exchange = true
n_buckets = 20
price_range_pct = 5.0
window_seconds = 300
retention_samples = 120
max_symbols = 48
book_top_n = 5
book_deep_top_n = 50
book_sample_interval_s = 5.0
sticky_min_samples = 3
void_depth_pctile = 10.0
forward_blend_ratio = 0.35
forward_confidence_min = 0.25
leverage_weights = [0.35, 0.30, 0.20, 0.10, 0.05]
vp_periods = ["1h", "4h", "1d", "1w"]
vp_buckets = 24
vp_value_area_pct = 0.70

[intra_bar]
# Intra-bar PRE-pump/PRE-dump — sequence detector.
# Sub-signals (DOM -> trade_burst -> momentum_z) arrive sequentially.
# PRE = DOM + trade_burst (confidence 0.67); ignition = + momentum (confidence 1.0).
# momentum_window is in m1 bars (1 min each).
# trade_window is in flush cycles (1 flush per 30s tick).
momentum_window = 10
trade_window = 10
burst_min = 0.30
dom_imbalance_min = 0.15
confidence_threshold = 0.67
min_trades_for_burst = 2
cooldown_seconds = 300
max_symbols = 100
dom_ema_alpha = 0.3
sequence_window_seconds = 60
dom_min_events = 1

[fusion]
# Official fusion tunables — see docs/FUSION_PARAMS.md (threshold-free detection is impossible).
# These values are now actually read by fusion_params() via load_config_defaults_toml().
min_n = 30
lookback = 120
q_gate = 0.92
q_phase = 0.85
min_active_factors = 2
global_gate_floor = 0.06
abs_magnitude_floor = 0.5
vol_floor_pct = 0.15
fusion_score_scale = 25.0
cusum_k = 0.5
cusum_span = 96
phase_mid_exit_ratio = 0.65
phase_mid_exit_bars = 2
funding_min_n = 48
pre_gate_min_energy = 1
pre_gate_min_structure = 0.10
pre_gate_min_magnitude = 0.08
mad_epsilon = 0.000001
robust_z_clip = 12.0
horizon_bars = 16
replay_warmup = 60
replay_target_atr = 1.5

# The old 5-module gating pipeline's config (hunt_core/deep/pipeline/config.py,
# [deep]/[deep.macro]/[deep.trend]/[deep.positioning]/[deep.risk]/[deep.new_coin]/
# [deep.regime]) was removed along with that file — PrizrakTrade
# (hunt_core/prizrak/config.py) is the sole Deep engine now and reads its own [deep.prizrak]
# section (currently unset, all dataclass defaults apply).
